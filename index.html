<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgeeGaming.com</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Agee Arcade</h1>
  <p class="tagline">A modern arcade entrance in 3D space. Click the glowing doors to step into the arcade lobby and start the game.</p>

  <div class="arcade-scene">
    <div class="arcade-building">
      <div class="arcade-sign">Agee Arcade</div>
      <div class="arcade-front">
        <div class="door-frame">
          <a class="arcade-door" href="https://ageegaming.com/AgeeArcade/" aria-label="Enter Agee Arcade"></a>
        </div>
      </div>
      <div class="arcade-base"></div>
    </div>
  </div>

  <p class="hint">Tap or click the arcade doors to enter the arcade. The building is your gateway to the Agee Arcade experience.</p>
  <footer>&copy; 2026 ageegaming.com</footer>
  <script src="script.js"></script>
</body>
</html>
